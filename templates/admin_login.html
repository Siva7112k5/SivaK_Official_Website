<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Admin Login | Nexus Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #3b0764 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 2.5rem;
            width: 100%;
            max-width: 28rem;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .login-card:hover { transform: translateY(-5px); }
        .icon-circle {
            width: 4rem;
            height: 4rem;
            background: linear-gradient(135deg, #22d3ee, #a855f7);
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }
        .icon-circle i { font-size: 2rem; color: white; }
        h2 {
            text-align: center;
            font-size: 1.875rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
        }
        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .input-group i {
            position: absolute;
            margin-left: 1rem;
            margin-top: 0.9rem;
            color: #64748b;
        }
        input {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 1rem;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #22d3ee;
            box-shadow: 0 0 0 2px rgba(34,211,238,0.2);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #06b6d4, #9333ea);
            border: none;
            border-radius: 1rem;
            padding: 0.75rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0.5rem;
        }
        .login-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 20px -5px rgba(6,182,212,0.4);
        }
        .error-message {
            background: rgba(239,68,68,0.2);
            border-left: 4px solid #ef4444;
            padding: 0.75rem 1rem;
            border-radius: 0.75rem;
            margin-bottom: 1.5rem;
            color: #fecaca;
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.2s;
        }
        .back-link a:hover { color: #22d3ee; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="icon-circle">
            <i class="fas fa-lock"></i>
        </div>
        <h2>Admin Access</h2>
        <div class="subtitle">Secure portal for project management</div>

        {% if error %}
        <div class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="input-group">
                <label><i class="fas fa-key"></i> Password</label>
                <input type="password" name="password" placeholder="Enter admin password" required autofocus>
            </div>
            <button type="submit" class="login-btn">
                <i class="fas fa-sign-in-alt mr-2"></i> Login to Dashboard
            </button>
        </form>
        <div class="back-link">
            <a href="/"><i class="fas fa-arrow-left"></i> Back to Portfolio</a>
        </div>
    </div>
</body>
</html>
